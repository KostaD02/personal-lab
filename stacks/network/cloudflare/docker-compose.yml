services:
  tunnel:
    container_name: cloudflared-tunnel
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    user: root
    volumes:
      - ./config.yml:/etc/cloudflared/config.yml:ro
    command: tunnel --config /etc/cloudflared/config.yml run --token YOUR_ACCESS_TOKEN
    networks:
      - proxy-nw

networks:
  proxy-nw:
    external: true
